<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ZendIQ Lite</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Header -->
<div class="header">
  <img src="../../assets/icon-48.png" width="30" height="30" alt="ZendIQ" class="header-logo">
  <div>
    <div class="brand-name">ZendIQ <span class="brand-lite">Lite</span></div>
    <div class="brand-sub">Swap Guardian</div>
  </div>
  <div class="badge-free">FREE</div>
</div>


<!-- Tab nav -->
<nav class="tab-nav">
  <button class="tab-btn active" data-tab="monitor">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
      <circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.4"/>
      <path d="M8 4.5V8L10 10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
    </svg>
    Monitor
  </button>
  <button class="tab-btn" data-tab="history">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
      <rect x="2" y="4" width="12" height="8" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
      <path d="M5 7.5H11M5 10H8.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
    </svg>
    History
  </button>
  <button class="tab-btn" data-tab="security" id="tab-security">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
      <path d="M8 2L13 4.3V8C13 11.1 10.8 13.7 8 14.7C5.2 13.7 3 11.1 3 8V4.3L8 2Z"
        stroke="currentColor" stroke-width="1.4"/>
      <path d="M6 8L7.3 9.5L10 6.5" stroke="currentColor" stroke-width="1.4"
        stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Wallet
  </button>
  <button class="tab-btn" data-tab="settings">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
      <circle cx="8" cy="8" r="1.8" stroke="currentColor" stroke-width="1.4"/>
      <path d="M8 1.5v2M8 12.5v2M1.5 8h2M12.5 8h2M3.6 3.6l1.4 1.4M11 11l1.4 1.4M3.6 12.4l1.4-1.4M11 5l1.4-1.4"
        stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
    </svg>
    Settings
  </button>
</nav>

<!-- Tab panels -->
<div class="tab-content">
  <div class="tab-panel active" id="panel-monitor"></div>
  <div class="tab-panel"        id="panel-history"></div>
  <div class="tab-panel"        id="panel-security"></div>
  <div class="tab-panel"        id="panel-settings"></div>
</div>

<!-- Footer -->
<div class="footer">
  <span class="footer-left">
    <span class="footer-link" id="footer-website">zendiq.ai</span>
    <span class="footer-version" id="footer-version">v&#8230;</span>
  </span>
  <span>Not financial advice &middot; use at own risk</span>
</div>

<script src="../utils/rpc.js"></script>
<script src="../utils/scoring.js"></script>
<script src="../utils/extraction.js"></script>
<script src="../utils/analytics.js"></script>
<script src="popup-monitor.js"></script>
<script src="popup-security.js"></script>
<script src="popup-history.js"></script>
<script src="popup-settings.js"></script>
<script src="popup.js"></script>
</body>
</html>
